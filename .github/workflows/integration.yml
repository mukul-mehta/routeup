name: Integration

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dev-server-integration:
    name: Vite/Next HMR Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Vite/Next integration tests
        run: go test -tags integration -run TestIntegration -timeout 15m ./internal/server
