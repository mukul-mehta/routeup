name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: extractions/setup-just@v4

      - name: just test-race
        run: just test-race

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: extractions/setup-just@v4

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  integration-debian:
    name: integration (debian, :${{ matrix.port }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        port: [443, 47443]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install setcap/getcap
        run: sudo apt-get update && sudo apt-get install -y libcap2-bin

      - name: build
        run: go build -buildvcs=false -o bin/routeup ./cmd/routeup

      # Native runner (real filesystem): both the privileged-bind path (443,
      # setcap on the binary) and the high-port path (47443, no setcap) work.
      - name: integration
        run: bash scripts/integration-linux.sh ./bin/routeup ${{ matrix.port }}

  integration-fedora:
    name: integration (fedora, :${{ matrix.port }})
    runs-on: ubuntu-latest
    container: fedora:latest
    strategy:
      fail-fast: false
      matrix:
        port: [443, 47443]
    steps:
      - name: install deps
        run: dnf install -y git golang libcap ca-certificates sudo python3 curl

      - uses: actions/checkout@v6

      - name: build
        run: go build -buildvcs=false -o bin/routeup ./cmd/routeup

      # Fedora only exists here as a container, so :443 stresses setcap on an
      # overlay filesystem (may reject the security.capability xattr); :47443
      # skips setcap. fail-fast:false keeps the cells independent so a setcap
      # limitation surfaces on its own.
      - name: integration
        run: bash scripts/integration-linux.sh ./bin/routeup ${{ matrix.port }}

  # The public server ships on every push to main. The CLI releases separately
  # (goreleaser, on v* tags), so the server tracks main while the CLI cuts
  # versioned releases on its own cadence.
  deploy:
    name: deploy (fly)
    # Gate on the deterministic checks only. The integration cells are
    # environment-sensitive by design (setcap on overlayfs, fail-fast:false), so
    # gating a production deploy on them would block ships on infra flakes.
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # The server is a single stateful instance — never two deploys at once. Let
    # an in-flight rollout finish rather than cancelling it midway.
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Run from the repo root (the default cwd): the Docker build context needs
      # go.mod and the source, while fly.toml resolves its Dockerfile relative
      # to deploy/. --remote-only builds on Fly's builders, so no local Docker.
      - name: flyctl deploy
        run: flyctl deploy --remote-only -c deploy/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

